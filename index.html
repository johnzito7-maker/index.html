<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperial</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* BANNER */
.hero {
    height: 100vh;
    background: 
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1507679799987-c73779587ccf');
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: fadeIn 2s ease-in-out;
}

.hero-content {
    animation: slideUp 1.5s ease;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 70px;
    letter-spacing: 8px;
    color: gold;
    text-shadow: 0 0 25px rgba(255,215,0,0.6);
}

.hero p {
    margin-top: 20px;
    font-size: 20px;
    letter-spacing: 2px;
}

.botao {
    display: inline-block;
    margin-top: 40px;
    padding: 18px 50px;
    background: linear-gradient(45deg, gold, #d4af37);
    color: black;
    font-weight: bold;
    text-decoration: none;
    border-radius: 50px;
    transition: 0.4s ease;
    box-shadow: 0 0 20px rgba(255,215,0,0.5);
}

.botao:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px rgba(255,215,0,0.9);
}

/* SEÇÃO */
.section {
    padding: 100px 20px;
    text-align: center;
    background: #0d0d0d;
}

.section h2 {
    font-size: 30px;
    margin-bottom: 20px;
}

.section p {
    max-width: 600px;
    margin: auto;
    line-height: 1.6;
    opacity: 0.8;
}

/* ANIMAÇÕES */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {transform: translateY(40px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}

footer {
    padding: 30px;
    text-align: center;
    background: black;
    font-size: 14px;
    opacity: 0.6;
}

@media(max-width:768px){
    .hero h1 {
        font-size: 42px;
    }
}
</style>
</head>

<body>

<section class="hero">
    <div class="hero-content">
        <h1>IMPERIAL</h1>
        <p>Serviço exclusivo para o Rubinot</p>
        <a class="botao" href="https://wa.me/SEUNUMEROAQUI" target="_blank">
            Falar no WhatsApp
        </a>
    </div>
</section>

<section class="section">
    <h2>Atendimento Premium</h2>
    <p>
        Sofisticação, discrição e excelência em cada detalhe.
        Uma experiência pensada para quem exige o mais alto padrão.
    </p>
</section>

<footer>
    © 2026 Imperial - Todos os direitos reservados
</footer>

</body>
</html>
